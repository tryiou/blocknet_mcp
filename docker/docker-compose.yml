services:
  blocknet-core:
    image: blocknetdx/blocknet:latest
    container_name: blocknet-core
    user: "${UID:-1000}:${GID:-1000}"
    env_file:
      - ../.env
    command: blocknetd
    restart: on-failure:3
    environment:
      - HOME=/opt/blockchain/home/
    stop_signal: SIGINT
    stop_grace_period: 10m
    volumes:
      - ${BLOCKNET_CHAINDIR}:/opt/blockchain/home/.blocknet
    logging:
      driver: "json-file"
      options:
        max-size: "2m"
        max-file: "10"
    network_mode: "host"
    healthcheck:
      test:
        [
          "CMD",
          "blocknet-cli",
          "getblockcount",
        ]
      interval: 30s
      timeout: 30s
      retries: 6
      start_period: 30s

  xbridge-mcp:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        - SERVER_TYPE=xbridge
    container_name: xbridge-mcp
    command: ["python", "-m", "xbridge_mcp.main"]
    env_file:
      - ../.env
    depends_on:
      blocknet-core:
        condition: service_healthy
    environment:
      # Note: BLOCKNET_CHAINDIR is the CONTAINER path, not host path.
      # The actual host path comes from ${BLOCKNET_CHAINDIR} which is mounted to
      # /opt/blockchain/blocknet inside the container via volumes below.
      - RPC_HOST=${RPC_HOST}
      - RPC_PORT=${RPC_PORT}
      - RPC_TIMEOUT=${RPC_TIMEOUT:-30}
      - BLOCKNET_CHAINDIR=/opt/blockchain/blocknet
      - XBRIDGE_MCP_ALLOW_WRITE=${XBRIDGE_MCP_ALLOW_WRITE:-false}
      - XBRIDGE_MCP_LOG_LEVEL=${XBRIDGE_MCP_LOG_LEVEL:-INFO}
      - XBRIDGE_MCP_TRANSPORT=${XBRIDGE_MCP_TRANSPORT:-http}
      - XBRIDGE_MCP_PORT=${XBRIDGE_MCP_PORT:-8081}
    volumes: &blocknet_volumes
      - ${BLOCKNET_CHAINDIR}/blocknet.conf:/opt/blockchain/blocknet/blocknet.conf:ro
    restart: unless-stopped
    network_mode: "host"
    healthcheck:
      test: ["CMD", "sh", "-c", "nc -z localhost 8081"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  xrouter-mcp:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        - SERVER_TYPE=xrouter
    container_name: xrouter-mcp
    command: ["python", "-m", "xrouter_mcp.main"]
    env_file:
      - ../.env
    depends_on:
      blocknet-core:
        condition: service_healthy
    environment:
      - RPC_HOST=${RPC_HOST}
      - RPC_PORT=${RPC_PORT}
      - RPC_TIMEOUT=${RPC_TIMEOUT:-30}
      - BLOCKNET_CHAINDIR=/opt/blockchain/blocknet
      - XROUTER_MCP_ALLOW_WRITE=${XROUTER_MCP_ALLOW_WRITE:-false}
      - XROUTER_MCP_LOG_LEVEL=${XROUTER_MCP_LOG_LEVEL:-INFO}
      - XROUTER_MCP_TRANSPORT=${XROUTER_MCP_TRANSPORT:-http}
      - XROUTER_MCP_PORT=${XROUTER_MCP_PORT:-8082}
    volumes: *blocknet_volumes
    restart: unless-stopped
    network_mode: "host"
    healthcheck:
      test: ["CMD", "sh", "-c", "nc -z localhost 8082"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
